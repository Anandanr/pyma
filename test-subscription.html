<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyMA - Subscription Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #667eea;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .plan-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .plan-price {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .plan-period {
            color: #666;
            font-size: 14px;
        }

        .trial-badge {
            display: inline-block;
            background: #e7f3ff;
            color: #0066cc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
            display: block;
        }

        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .features h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            padding: 8px 0;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkmark {
            color: #4caf50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">pA</div>
                    <span style="font-weight: 600; color: #1a1a1a;">pymA</span>
                </div>
                <h1>Start Your Free Trial</h1>
                <p class="subtitle">Get 7 days free, then $29/month</p>
            </div>

            <div class="plan-info">
                <div class="plan-price">$29</div>
                <div class="plan-period">per month after trial</div>
                <div class="trial-badge">✓ 7 days free trial</div>
            </div>

            <div id="message" class="message"></div>

            <form id="enrollForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@company.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input 
                        type="text" 
                        id="company" 
                        name="company" 
                        placeholder="Your Company" 
                        required
                    >
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        Start Free Trial
                    </button>
                </div>
            </form>

            <div class="features">
                <h3>What's included:</h3>
                <ul class="feature-list">
                    <li><span class="checkmark">✓</span> AI-powered customer support</li>
                    <li><span class="checkmark">✓</span> Unlimited conversations</li>
                    <li><span class="checkmark">✓</span> 7-day free trial</li>
                    <li><span class="checkmark">✓</span> No payment required upfront</li>
                    <li><span class="checkmark">✓</span> Cancel anytime</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000'; // Change to your actual domain in production

        document.getElementById('enrollForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const company = document.getElementById('company').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageEl = document.getElementById('message');

            // Reset message
            messageEl.className = 'message';
            messageEl.textContent = '';

            // Disable button
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = '<span class="loader"></span>Processing...';

            try {
                const response = await fetch(`${API_URL}/api/v1/pyma/enroll`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plan: 'monthly',
                        email,
                        company,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Failed to create subscription');
                }

                // Success - redirect to Stripe
                if (data.checkout_url) {
                    messageEl.className = 'message success';
                    messageEl.textContent = 'Redirecting to checkout...';
                    setTimeout(() => {
                        window.location.href = data.checkout_url;
                    }, 1000);
                }
            } catch (err) {
                messageEl.className = 'message error';
                messageEl.textContent = err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        function clearForm() {
            document.getElementById('enrollForm').reset();
            document.getElementById('message').className = 'message';
            document.getElementById('message').textContent = '';
        }

        // Test data - remove in production
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 't') {
                document.getElementById('email').value = `test${Date.now()}@test.com`;
                document.getElementById('company').value = 'Test Company';
                console.log('Test data populated. Submit the form to test.');
            }
        });
    </script>
</body>
</html>
